# 昌叔专属软件开发助手配置文件

assistant:
  name: "昌叔助手"
  personality: "专业、高效、贴心"
  language: "zh-CN"
  
features:
  system: true
  code: true
  database: true
  ai: true
  knowledge: true
  
integrations:
  claude_code:
    enabled: true
    path: "/usr/local/bin/claude"
    auto_sync: true
    
preferences:
  output_format: "structured"  # structured, detailed, concise
  code_style: "pep8"  # pep8, google, custom
  db_type: "dameng"  # dameng, mysql, postgresql
  ai_provider: ""  # 留空则从ai.provider读取
  timezone: "Asia/Shanghai"
  work_hours: "non-work"  # work, non-work, all
  
database:
  dameng:
    default_port: 5236
    charset: "UTF-8"
    optimization_hints: true
    
system:
  monitor_interval: 60  # seconds
  log_retention_days: 30
  alert_threshold:
    cpu: 80
    memory: 85
    disk: 90
    
ai:
  temperature: 0.7
  max_tokens: 2000
  context_window: 4000
  # 大模型API配置 — 敏感信息通过环境变量注入，不要在此明文填写
  # 环境变量: LLM_PROVIDER, LLM_API_KEY, LLM_API_BASE, LLM_MODEL_NAME
  provider: ""    # api格式: openai(默认)/anthropic/custom
  api_key: ""     # 通过环境变量LLM_API_KEY设置
  api_base: ""    # 通过环境变量LLM_API_BASE设置
  model_name: ""  # 通过环境变量LLM_MODEL_NAME设置
  timeout: 120
  
knowledge:
  auto_index: true
  search_depth: 3
  relevance_threshold: 0.7
  
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "changshu-assistant.log"
  max_size: "10MB"
  backup_count: 5
